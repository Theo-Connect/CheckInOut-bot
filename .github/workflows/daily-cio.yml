name: Post Slack Daily Check-in (Weekdays 00:01 KST)

on:
  schedule:
    - cron: "1 15 * * 0-4"    # 일~목 UTC 15:01 = 월~금 KST 00:01
  workflow_dispatch: {}       # 필요시 수동 실행 옵션

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Post to Slack
        run: node index.js
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          KOREAN_HOLIDAY_API_KEY: ${{ secrets.KOREAN_HOLIDAY_API_KEY }}
          CHECKIN_LAT: "37.5310"
          CHECKIN_LON: "126.9140"
